<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320" role="img" aria-label="FlowState timeline: focus and stress across one match, with kill and death events; focus crashes 68 to 31 after a double death">
  <defs>
    <linearGradient id="focusFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f1b27a" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#f1b27a" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="card"><rect width="900" height="320" rx="14"/></clipPath>
  </defs>

  <g clip-path="url(#card)" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
    <rect width="900" height="320" fill="#0a0a0c"/>
    <rect width="900" height="320" fill="none" stroke="#26222e" stroke-width="2" rx="14"/>

    <!-- title row -->
    <text x="28" y="36" font-size="12" font-weight="600" letter-spacing="1.6" fill="#a1a1aa">TRACELOG · SESSION REVIEW</text>
    <g font-size="12" fill="#a1a1aa">
      <circle cx="706" cy="31" r="4" fill="#f1b27a"/><text x="716" y="35">FlowState</text>
      <circle cx="796" cy="31" r="4" fill="#e5757b"/><text x="806" y="35">stress</text>
    </g>

    <!-- plot area: x 60..860, y 60..250 (focus 0..100 → y 250..60) -->
    <g stroke="#1c1922" stroke-width="1">
      <line x1="60" y1="98"  x2="860" y2="98"/>
      <line x1="60" y1="155" x2="860" y2="155"/>
      <line x1="60" y1="212" x2="860" y2="212"/>
    </g>
    <g font-size="10" fill="#565060" text-anchor="end">
      <text x="52" y="101">80</text>
      <text x="52" y="158">50</text>
      <text x="52" y="215">20</text>
    </g>

    <!-- stress line (behind) -->
    <path fill="none" stroke="#e5757b" stroke-width="2" stroke-opacity="0.75" stroke-linejoin="round"
      d="M60,180 C120,176 160,182 200,174 C240,168 280,176 320,170 C360,165 390,160 420,150
         C450,138 470,110 500,104 C530,100 560,118 600,132 C650,148 700,158 750,166 C790,171 830,174 860,172"/>

    <!-- focus area + line -->
    <path fill="url(#focusFill)"
      d="M60,120 C120,116 170,124 220,118 C270,112 320,120 370,116 C400,113 430,110 455,114
         C480,120 495,170 515,192 C530,208 545,196 570,186 C610,170 660,150 710,138 C760,128 820,122 860,120 L860,250 L60,250 Z"/>
    <path fill="none" stroke="#f1b27a" stroke-width="2.5" stroke-linejoin="round"
      d="M60,120 C120,116 170,124 220,118 C270,112 320,120 370,116 C400,113 430,110 455,114
         C480,120 495,170 515,192 C530,208 545,196 570,186 C610,170 660,150 710,138 C760,128 820,122 860,120"/>

    <!-- events on the baseline: labeled, never color-alone -->
    <g font-size="10" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
      <g fill="#7dd3a8">
        <path d="M180,262 l5,9 h-10 z"/><text x="180" y="286">kill</text>
        <path d="M700,262 l5,9 h-10 z"/><text x="700" y="286">kill</text>
      </g>
      <g fill="#d94f56">
        <path d="M472,271 l5,-9 h-10 z"/>
        <path d="M508,271 l5,-9 h-10 z"/>
        <text x="490" y="286">double death</text>
      </g>
      <text x="60"  y="286" fill="#565060">0:00</text>
      <text x="490" y="304" fill="#565060">24:10</text>
      <text x="860" y="286" fill="#565060" text-anchor="end">41:32</text>
    </g>

    <!-- crash annotation -->
    <line x1="490" y1="112" x2="490" y2="250" stroke="#d94f56" stroke-width="1" stroke-dasharray="3 4" stroke-opacity="0.7"/>
    <g font-size="12">
      <text x="530" y="228" fill="#fbfbfb" font-weight="600">focus 68 → 31</text>
      <text x="530" y="244" fill="#6f6a78">tilt spiral — click to seek the video here</text>
    </g>
  </g>
</svg>
