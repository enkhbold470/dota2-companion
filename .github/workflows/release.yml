name: Release (Windows installer)

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

jobs:
  windows-installer:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install workspace (shared / listener / overlay)
        run: pnpm install --frozen-lockfile

      - name: Build the overlay
        run: pnpm --filter @dc/overlay build

      # Electron app is isolated from the pnpm workspace — install it with npm.
      - name: Install desktop deps
        run: npm install
        working-directory: apps/desktop

      - name: Build Windows installer
        run: npm run dist
        working-directory: apps/desktop

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: dota2-companion-windows
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.blockmap
            apps/desktop/release/latest.yml

      # Attach the installer AND the auto-update metadata (latest.yml + blockmap) so
      # electron-updater can detect and delta-download the next release.
      - name: Attach installer + update feed to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.blockmap
            apps/desktop/release/latest.yml
