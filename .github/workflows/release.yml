name: Release (installers)

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
            globs: |
              apps/desktop/release/*.exe
              apps/desktop/release/*.blockmap
              apps/desktop/release/latest.yml
          - os: macos-14        # Apple Silicon (arm64) runner
            name: macos-arm64
            globs: |
              apps/desktop/release/*.dmg
              apps/desktop/release/*.zip
              apps/desktop/release/*.blockmap
              apps/desktop/release/latest-mac.yml
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    env:
      # Build unsigned — we have no Apple/Windows signing cert. Stops electron-builder
      # from trying (and hanging on) auto-discovered identities.
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install workspace (shared / listener / overlay)
        run: pnpm install --frozen-lockfile

      - name: Build the overlay
        run: pnpm --filter @dc/overlay build

      # Electron app is isolated from the pnpm workspace — install it with npm.
      - name: Install desktop deps
        run: npm install
        working-directory: apps/desktop

      - name: Build installer (host platform)
        run: npm run dist
        working-directory: apps/desktop

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: dota2-companion-${{ matrix.name }}
          path: ${{ matrix.globs }}

      # Attach the installer AND the auto-update metadata so electron-updater can
      # detect and delta-download the next release.
      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.globs }}
