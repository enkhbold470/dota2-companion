appId: com.enkhbold470.dota2companion
productName: Dota 2 Companion
copyright: Read-only, advisory-only. Uses only Valve GSI.

directories:
  output: release

# Space-free artifact names. electron-builder writes the filename with hyphens
# into latest.yml, but GitHub converts spaces in an uploaded asset to dots — so a
# spaced productName makes the updater look for "Dota-2-Companion-…exe" while the
# asset is "Dota.2.Companion.…exe" → 404. Naming with hyphens up front keeps the
# built file, latest.yml, and the GitHub asset identical (no spaces to convert).
artifactName: Dota-2-Companion-${version}-${arch}.${ext}

# Auto-update feed. electron-builder writes app-update.yml into the package and a
# latest.yml alongside the installer; electron-updater reads GitHub releases from here.
publish:
  provider: github
  owner: enkhbold470
  repo: dota2-companion

# The main process is bundled to a single self-contained file, so we only ship
# that plus the built overlay (as an extra resource served by the listener).
files:
  - dist/**
  - package.json

extraResources:
  - from: ../overlay/dist
    to: overlay

win:
  target:
    - nsis
  # NOTE: do NOT set publisherName here. On Windows electron-updater verifies the
  # downloaded update is Authenticode-signed by that publisher; since we ship
  # UNSIGNED, setting it makes every auto-update fail with "New version is not
  # signed by the application owner: publisherNames: NeuroFocus". With it unset,
  # electron-updater skips signature verification for the unsigned build and
  # updates install. (It never helped SmartScreen anyway — only real signing does.)

# Branded assisted installer: NeuroFocus sidebar art + license/privacy/terms
# page (build/license.txt). Icons come from build/icon.png (auto-converted).
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: Dota 2 Companion
  installerSidebar: build/installerSidebar.bmp
  uninstallerSidebar: build/installerSidebar.bmp
  # No arch in the installer name (it's a universal per-user NSIS), and no spaces.
  artifactName: Dota-2-Companion-Setup-${version}.${ext}

mac:
  category: public.app-category.games
  # Unsigned build (no Apple Developer cert). Gatekeeper will ask the user to
  # right-click → Open the first time. arm64 = Apple Silicon (M-series).
  identity: null
  target:
    - target: dmg
      arch: arm64
    - target: zip     # zip feeds electron-updater's macOS channel (latest-mac.yml)
      arch: arm64

dmg:
  writeUpdateInfo: true
